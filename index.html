<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Tracking Lokasi Akurat</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

    <style>
        body { margin: 0; font-family: Arial; }
        #map { height: 85vh; }

        .controls {
            padding: 10px;
            background: #f4f4f4;
            text-align: center;
        }

        button {
            padding: 10px;
            margin: 5px;
            cursor: pointer;
        }

        #info {
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="controls">
    <button onclick="startTracking()">🎯 Mulai Tracking Akurat</button>
    <button onclick="stopTracking()">🛑 Stop</button>
    <div id="info"></div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
let map = L.map('map').setView([0,0], 2);
let marker, circle, watchId;

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);

let bestAccuracy = Infinity;

function startTracking() {
    const info = document.getElementById("info");

    if (!navigator.geolocation) {
        info.innerHTML = "❌ Geolocation tidak didukung";
        return;
    }

    bestAccuracy = Infinity;

    watchId = navigator.geolocation.watchPosition(
        (pos) => {
            const lat = pos.coords.latitude;
            const lng = pos.coords.longitude;
            const acc = pos.coords.accuracy;

            // Ambil yang paling akurat
            if (acc < bestAccuracy) {
                bestAccuracy = acc;

                info.innerHTML = `
                    📍 Lokasi Terbaik Ditemukan<br>
                    Lat: ${lat} <br>
                    Lng: ${lng} <br>
                    Akurasi: ±${acc.toFixed(2)} meter
                `;

                map.setView([lat, lng], 18);

                if (marker) map.removeLayer(marker);
                if (circle) map.removeLayer(circle);

                marker = L.marker([lat, lng]).addTo(map)
                    .bindPopup("📍 Lokasi paling akurat")
                    .openPopup();

                circle = L.circle([lat, lng], {
                    radius: acc,
                }).addTo(map);
            }

            console.log("Update:", acc);
        },
        (err) => {
            info.innerHTML = "❌ Error: " + err.message;
            console.log(err);
        },
        {
            enableHighAccuracy: true,
            timeout: 15000,
            maximumAge: 0
        }
    );
}

function stopTracking() {
    if (watchId) {
        navigator.geolocation.clearWatch(watchId);
        document.getElementById("info").innerHTML += "<br>🛑 Tracking dihentikan";
    }
}
</script>

</body>
</html>
