<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Cek Lokasi Saya</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }

        #map {
            height: 90vh;
            width: 100%;
        }

        .controls {
            padding: 10px;
            background: #f5f5f5;
            text-align: center;
        }

        button {
            padding: 10px 15px;
            font-size: 16px;
            cursor: pointer;
        }

        #info {
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="controls">
    <button onclick="getLocation()">📍 Ambil Lokasi Saya</button>
    <div id="info"></div>
</div>

<div id="map"></div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
    let map = L.map('map').setView([0, 0], 2);
    let marker;

    // Load tile map
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    function getLocation() {
        const info = document.getElementById("info");

        if (!navigator.geolocation) {
            info.innerHTML = "❌ Browser tidak mendukung Geolocation";
            return;
        }

        info.innerHTML = "⏳ Mengambil lokasi...";

        navigator.geolocation.getCurrentPosition(
            (position) => {
                const lat = position.coords.latitude;
                const lng = position.coords.longitude;
                const accuracy = position.coords.accuracy;

                info.innerHTML = `
                    ✅ Lokasi ditemukan! <br>
                    Latitude: ${lat} <br>
                    Longitude: ${lng} <br>
                    Akurasi: ±${accuracy} meter
                `;

                // Set view ke lokasi user
                map.setView([lat, lng], 16);

                // Hapus marker lama
                if (marker) {
                    map.removeLayer(marker);
                }

                // Tambah marker baru
                marker = L.marker([lat, lng]).addTo(map)
                    .bindPopup("📍 Kamu di sini")
                    .openPopup();

                // Tambah circle akurasi
                L.circle([lat, lng], {
                    radius: accuracy
                }).addTo(map);
            },
            (error) => {
                switch(error.code) {
                    case error.PERMISSION_DENIED:
                        info.innerHTML = "❌ Izin lokasi ditolak";
                        break;
                    case error.POSITION_UNAVAILABLE:
                        info.innerHTML = "❌ Lokasi tidak tersedia";
                        break;
                    case error.TIMEOUT:
                        info.innerHTML = "❌ Timeout";
                        break;
                    default:
                        info.innerHTML = "❌ Error tidak diketahui";
                }
            }
        );
    }
</script>

</body>
</html>
